apiVersion: 1

providers:
  - name: formation-kafka
    orgId: 1
    folder: Formation Kafka
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
