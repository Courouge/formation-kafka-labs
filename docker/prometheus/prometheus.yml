global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: formation-kafka
    env: lab

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: kafka-brokers
    metrics_path: /metrics
    static_configs:
      - targets:
          - kafka1:7071
          - kafka2:7071
          - kafka3:7071
        labels:
          service: kafka
    relabel_configs:
      - source_labels: [__address__]
        regex: "kafka([0-9]+):.*"
        target_label: broker_id
        replacement: "$1"

  - job_name: kafka-connect
    metrics_path: /metrics
    static_configs:
      - targets:
          - connect:7074
        labels:
          service: kafka-connect

  - job_name: kafka-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - kafka-exporter:9308
        labels:
          service: kafka-exporter
