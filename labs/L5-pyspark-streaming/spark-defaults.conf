# Lab L5 — config Spark locale pour exécution depuis l'hôte
# Permet de lancer pyspark / spark-submit sans tout passer en CLI.
# Usage : SPARK_CONF_DIR=$(pwd) pyspark   (depuis labs/L5-pyspark-streaming/)

# Master local (les tests du lab tournent côté hôte ; le cluster Docker reste
# disponible si on souhaite déposer le job via spark-submit --master spark://localhost:7077).
spark.master                                   local[2]

# Driver / executor sizing minimal pour éviter l'OOM sur petites VM
spark.driver.memory                            1g
spark.executor.memory                          1g

# Packages chargés à la volée par Ivy (réseau requis au premier run)
spark.jars.packages                            org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.spark:spark-avro_2.12:3.5.0,io.delta:delta-spark_2.12:3.1.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262

# Activation de Delta Lake comme format par défaut
spark.sql.extensions                           io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog                org.apache.spark.sql.delta.catalog.DeltaCatalog

# Accès à MinIO (S3-compatible) côté hôte
spark.hadoop.fs.s3a.endpoint                   http://localhost:9000
spark.hadoop.fs.s3a.access.key                 minioadmin
spark.hadoop.fs.s3a.secret.key                 minioadmin
spark.hadoop.fs.s3a.path.style.access          true
spark.hadoop.fs.s3a.connection.ssl.enabled     false
spark.hadoop.fs.s3a.aws.credentials.provider   org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Logs moins verbeux (utile en exécution interactive)
spark.sql.shuffle.partitions                   4
spark.ui.showConsoleProgress                   false
