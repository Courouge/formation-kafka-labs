# Configuration client SASL/SCRAM pour les commandes admin (kafka-configs, kafka-acls, kafka-topics).
# Utilisée à l'intérieur du conteneur kafka-sec-1 lors de l'exécution des scripts d'amorçage.
security.protocol=SASL_PLAINTEXT
sasl.mechanism=SCRAM-SHA-256
sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="admin" password="admin-secret";
