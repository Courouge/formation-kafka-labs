# Lab L6 — configuration Typesafe.
# Toutes les clés peuvent être surchargées via variables d'environnement
# (la syntaxe ${?ENV_VAR} ne remplace que si la variable est définie).

l6 {
  # Brokers Kafka — depuis l'hôte: localhost:9092,9093,9094
  # depuis un container Docker: kafka1:29092,...
  bootstrap-servers = "kafka1:29092,kafka2:29092,kafka3:29092"
  bootstrap-servers = ${?BOOTSTRAP_SERVERS}

  schema-registry-url = "http://schema-registry:8081"
  schema-registry-url = ${?SCHEMA_REGISTRY_URL}

  # MinIO / S3
  s3-endpoint   = "http://minio:9000"
  s3-endpoint   = ${?S3_ENDPOINT}
  s3-access-key = "minioadmin"
  s3-access-key = ${?S3_ACCESS_KEY}
  s3-secret-key = "minioadmin"
  s3-secret-key = ${?S3_SECRET_KEY}

  # Médaillon
  bronze-path     = "s3a://bronze/"
  bronze-path     = ${?BRONZE_PATH}
  silver-path     = "s3a://silver/"
  silver-path     = ${?SILVER_PATH}
  checkpoint-path = "s3a://silver/_checkpoints/"
  checkpoint-path = ${?CHECKPOINT_PATH}

  # Topics
  topic-orders    = "ecommerce.public.orders"
  topic-orders    = ${?TOPIC_ORDERS}
  topic-payments  = "ecommerce.public.payments"
  topic-payments  = ${?TOPIC_PAYMENTS}
  topic-customers = "ecommerce.public.customers"
  topic-customers = ${?TOPIC_CUSTOMERS}
}
